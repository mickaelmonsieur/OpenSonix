name: Build Raspberry Pi Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write   # required to create the GitHub Release

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Build React client on the host (fast, no QEMU) ──────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build React client
        working-directory: ui
        run: |
          npm ci
          npm run build          # vite build client → ui/dist/
          rm -rf node_modules    # will be reinstalled for ARM inside the chroot

      # ── 3. Clone pi-gen ────────────────────────────────────────────────────
      - name: Clone pi-gen
        run: git clone --depth=1 https://github.com/RPi-Distro/pi-gen.git

      # ── 4. Assemble stage (copy sources into files/, then copy stage into pi-gen)
      - name: Prepare pi-gen stage
        run: |
          mkdir -p image/stage-opensonix/files
          cp -r ui             image/stage-opensonix/files/ui
          cp -r systemd        image/stage-opensonix/files/systemd
          cp -r baresip-config image/stage-opensonix/files/baresip-config
          echo "${{ github.ref_name }}" > image/stage-opensonix/files/opensonix-release

          cp -r image/stage-opensonix pi-gen/stage-opensonix

          # Skip official stages we don't need
          for s in stage2 stage3 stage4 stage5; do
            touch "pi-gen/${s}/SKIP" "pi-gen/${s}/SKIP_IMAGES" 2>/dev/null || true
          done

      # ── 5. Pi-gen config ───────────────────────────────────────────────────
      - name: Write pi-gen config
        run: |
          {
            echo "IMG_NAME=opensonix"
            echo "RELEASE=bookworm"
            echo "DEPLOY_COMPRESSION=xz"
            echo "TARGET_HOSTNAME=opensonix"
            echo "LOCALE_DEFAULT=en_GB.UTF-8"
            echo "KEYBOARD_KEYMAP=gb"
            echo "TIMEZONE_DEFAULT=Europe/Paris"
            echo "FIRST_USER_NAME=opensonix"
            echo "FIRST_USER_PASS=opensonix"
            echo "ENABLE_SSH=1"
            echo 'STAGE_LIST="stage0 stage1 stage-opensonix"'
          } > pi-gen/config

      # ── 6. Free up disk space ──────────────────────────────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet
          df -h

      # ── 7. Install pi-gen build dependencies (run build.sh directly, no Docker)
      #       build-docker.sh wraps everything in an i386 container which makes
      #       installing qemu-arm inside it painful. Running build.sh directly on
      #       the ubuntu-latest runner with qemu-user-static is much cleaner.
      - name: Install pi-gen build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coreutils quilt parted qemu-user-static debootstrap zerofree \
            dosfstools libarchive-tools libcap2-bin grep rsync xz-utils file \
            git curl bc gpg pigz xxd arch-test bmap-tools
          # pi-gen checks for 'qemu-arm'; qemu-user-static provides 'qemu-arm-static'
          sudo ln -sf /usr/bin/qemu-arm-static /usr/local/bin/qemu-arm

      # ── 8. Build image ─────────────────────────────────────────────────────
      - name: Build image
        run: |
          cd pi-gen
          sudo ./build.sh
        env:
          DEBIAN_FRONTEND: noninteractive

      # ── 9. Locate and compress image ───────────────────────────────────────
      - name: Locate image
        run: |
          IMAGE=$(find pi-gen/deploy -maxdepth 1 \( -name "*.img.xz" -o -name "*.img" \) | sort | tail -1)
          if [[ "$IMAGE" != *.xz ]]; then
            echo "Compressing $IMAGE …"
            xz -9 -T0 "$IMAGE"
            IMAGE="${IMAGE}.xz"
          fi
          echo "IMAGE_PATH=${IMAGE}"      >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$(basename "${IMAGE}")" >> "$GITHUB_ENV"

      # ── 10. Create GitHub Release and attach image ─────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OpenSonix ${{ github.ref_name }}"
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## OpenSonix ${{ github.ref_name }}

            Raspberry Pi OS Bookworm image (armhf — compatible Pi 2/3/4/5/Zero 2W).

            ### Flash

            Use [Raspberry Pi Imager](https://www.raspberrypi.com/software/) or:

            ```bash
            xz -d ${{ env.IMAGE_NAME }}
            sudo dd if=${IMAGE_NAME%.xz} of=/dev/sdX bs=4M status=progress
            ```

            ### Premier accès

            | | Identifiant | Mot de passe |
            |---|---|---|
            | Interface web | `http://opensonix.local` → `admin` | `opensonix` ⚠ changez-le |
            | Console physique | `opensonix` | `opensonix` ⚠ changez-le |

          files: ${{ env.IMAGE_PATH }}
